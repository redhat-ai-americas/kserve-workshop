# Sample InferenceService: model artifacts in an OCI image (workshop: MobileNet v2 ONNX).
# Edit storageUri, runtime, and resources to match your cluster and installed ServingRuntime.
# Topic 2 builds the image; Topic 4 applies this file (often from scratch/ after cp).
# For private registries, add pull secrets per docs/04-yaml-and-cli.md (Private OCI registry).
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: sample-isvc-oci
  namespace: kserve-workshop
spec:
  predictor:
    model:
      # Must match a ServingRuntime name in your project (or cluster) — e.g. OpenVINO OVMS if available.
      runtime: kserve-ovms
      modelFormat:
        name: onnx
      storageUri: oci://quay.io/EXAMPLE_ORG/EXAMPLE_REPO:EXAMPLE_TAG
      resources:
        requests:
          cpu: "100m"
          memory: "500Mi"
        limits:
          cpu: "500m"
          memory: "4Gi"
