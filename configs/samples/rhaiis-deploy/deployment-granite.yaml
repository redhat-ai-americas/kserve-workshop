# Red Hat AI Inference Server (vLLM CUDA) on OpenShift — ORAS pull matches product guide Chapter 5
# (granite-3-1-8b-instruct-quantized-w8a8), not the Topic 4 modelcar (KServe unpacks that OCI differently).
# Requires docker-secret (registry.redhat.io). See docs/08-red-hat-ai-inference-server.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: granite-rhaiis
  namespace: rhaii-namespace
  labels:
    app: granite-rhaiis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: granite-rhaiis
  template:
    metadata:
      labels:
        app: granite-rhaiis
    spec:
      imagePullSecrets:
        - name: docker-secret
      volumes:
        - name: model-volume
          persistentVolumeClaim:
            claimName: rhaiis-model-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: oci-auth
          secret:
            secretName: docker-secret
            items:
              # Matches `docker-secret` from docs/08 Step 2 (cluster pull-secret copy or ~/.docker/config.json).
              - key: .dockerconfigjson
                path: config.json
      serviceAccountName: default
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: fetch-model
          image: ghcr.io/oras-project/oras:v1.2.0
          env:
            - name: DOCKER_CONFIG
              value: /auth
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # vLLM needs a HF-style tree (config.json at --model). This OCI matches the RHAIIS OCP guide ORAS example.
              if [ -f /model/config.json ]; then
                echo "Model already present, skipping pull"
              else
                echo "Pulling model OCI..."
                find /model -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
                oras pull registry.redhat.io/rhelai1/granite-3-1-8b-instruct-quantized-w8a8:1.5 --output /model
              fi
          volumeMounts:
            - name: model-volume
              mountPath: /model
            - name: oci-auth
              mountPath: /auth
              readOnly: true
      containers:
        - name: vllm
          image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:ec799bb5eeb7e25b4b25a8917ab5161da6b6f1ab830cbba61bba371cffb0c34d
          imagePullPolicy: IfNotPresent
          env:
            - name: VLLM_SERVER_DEV_MODE
              value: "1"
            - name: HF_HOME
              value: /tmp/hf_home
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            # Required for Route/Service: listen on all interfaces (not only 127.0.0.1) or the router returns 503.
            - --host
            - 0.0.0.0
            - --port=8080
            - --model=/model
            - --served-model-name=granite-3-1-8b-instruct-quantized-w8a8
            - --tensor-parallel-size=1
            - --max-model-len
            - "8192"
            - --gpu-memory-utilization
            - "0.90"
            - --dtype
            - auto
            - --max-num-seqs
            - "256"
          resources:
            limits:
              cpu: "10"
              memory: 16Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "2"
              memory: 6Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-volume
              mountPath: /model
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
      restartPolicy: Always
