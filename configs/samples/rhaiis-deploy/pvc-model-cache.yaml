# Model cache for the ORAS init container and vLLM. Adjust storage size and storageClassName for your cluster.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rhaiis-model-cache
  namespace: rhaii-namespace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi